<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Certification Compliance · 360Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* 360Learning brand palette */
        --primary: #4AC994;      /* 360Green */
        --ink: #18191D;          /* Night */
        --ink-2: #33353D;        /* Night-3 */
        --ink-3: #484D59;        /* Dove */
        --mute: #82889A;         /* Silver */
        --line: #E6E9F0;         /* Alto */
        --hairline: #F3F3F9;     /* Gallery */
        --surface: #FBF6F2;      /* Lungo */
        --surface-alt: #FFFFFF;  /* White */

        /* status */
        --ok: #2C9473;           /* Emerald */
        --ok-soft: #D7F0E5;      /* White Ice */
        --bad: #EB4040;          /* TorchRed */
        --bad-soft: #FBD9D9;     /* LightRed */
        --warn: #FFC10D;         /* Supernova */
        --warn-soft: #FFF3CF;    /* BirdChild */
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--surface); color: var(--ink); }
      body {
        font-family: "Plus Jakarta Sans", -apple-system, sans-serif;
        font-size: 15px;
        line-height: 1.5;
        min-height: 100vh;
      }
      .mono { font-family: "JetBrains Mono", monospace; font-variant-numeric: tabular-nums; }

      .wrap { max-width: 1180px; margin: 0 auto; padding: 48px 32px 80px; }

      header {
        display: flex; align-items: center; justify-content: space-between;
        padding-bottom: 24px; margin-bottom: 48px;
        border-bottom: 1px solid var(--line);
      }
      .logo { height: 28px; width: auto; display: block; }
      .stamp {
        font-family: "JetBrains Mono", monospace; font-size: 12px;
        color: var(--mute); display: flex; align-items: center; gap: 8px;
      }
      .stamp .dot {
        display: inline-block; width: 6px; height: 6px; border-radius: 50%;
        background: var(--primary); box-shadow: 0 0 0 4px rgba(74, 201, 148, 0.2);
      }

      .lede { margin-bottom: 64px; }
      .kicker {
        font-family: "JetBrains Mono", monospace; font-size: 11px;
        text-transform: uppercase; letter-spacing: 0.18em; color: var(--primary);
        font-weight: 600; margin-bottom: 16px;
      }
      h1 {
        font-family: "Plus Jakarta Sans", sans-serif; font-weight: 700;
        font-size: clamp(40px, 5.2vw, 60px); line-height: 1.05;
        letter-spacing: -0.025em; margin: 0 0 16px; color: var(--ink);
      }
      .sub { color: var(--ink-3); font-size: 17px; max-width: 58ch; }
      .sub strong { color: var(--ink); font-weight: 600; }

      .grid-primary {
        display: grid; gap: 24px;
        grid-template-columns: 1.3fr 1fr;
        margin-bottom: 56px;
      }
      @media (max-width: 860px) {
        .grid-primary { grid-template-columns: 1fr; }
      }

      .panel {
        background: var(--surface-alt);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 32px;
      }
      .panel .title {
        font-family: "JetBrains Mono", monospace; font-size: 11px;
        text-transform: uppercase; letter-spacing: 0.16em; color: var(--mute);
        font-weight: 600; margin-bottom: 20px;
      }

      /* Donut panel */
      .donut-panel { display: grid; grid-template-columns: 220px 1fr; gap: 32px; align-items: center; }
      @media (max-width: 560px) {
        .donut-panel { grid-template-columns: 1fr; text-align: center; }
      }

      .donut { position: relative; width: 220px; height: 220px; margin: 0 auto; }
      .donut svg { width: 100%; height: 100%; transform: rotate(-90deg); }
      .donut .center {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center;
      }
      .donut .center .big {
        font-family: "Plus Jakarta Sans", sans-serif;
        font-size: 56px; font-weight: 700; line-height: 1;
        letter-spacing: -0.03em; color: var(--ink);
      }
      .donut .center .lbl {
        font-family: "JetBrains Mono", monospace; font-size: 10px;
        text-transform: uppercase; letter-spacing: 0.18em; color: var(--mute);
        margin-top: 10px; font-weight: 600;
      }

      .legend { list-style: none; padding: 0; margin: 0; }
      .legend li {
        display: grid; grid-template-columns: 12px 1fr auto;
        gap: 14px; align-items: baseline;
        padding: 14px 0;
      }
      .legend li + li { border-top: 1px solid var(--hairline); }
      .swatch { width: 10px; height: 10px; border-radius: 3px; align-self: center; }
      .legend .name { font-size: 14px; color: var(--ink); font-weight: 500; }
      .legend .name small { display: block; font-weight: 400; color: var(--mute); font-size: 12px; margin-top: 2px; }
      .legend .count {
        font-family: "Plus Jakarta Sans", sans-serif; font-size: 22px; font-weight: 700;
        color: var(--ink); letter-spacing: -0.02em;
      }
      .legend .count small {
        font-family: "JetBrains Mono", monospace; font-size: 11px;
        color: var(--mute); font-weight: 500; margin-left: 4px;
      }

      /* Renewal panel */
      .renewals { display: flex; flex-direction: column; gap: 16px; }
      .renewal {
        display: flex; align-items: center; justify-content: space-between;
        padding: 20px 24px;
        border-radius: 12px;
        background: var(--hairline);
        border: 1px solid var(--line);
      }
      .renewal.has-due { background: var(--warn-soft); border-color: #FFE09A; }
      .renewal .r-left .n {
        font-family: "JetBrains Mono", monospace; font-size: 11px;
        color: var(--mute); text-transform: uppercase; letter-spacing: 0.14em;
        margin-bottom: 4px; font-weight: 600;
      }
      .renewal .r-left .w {
        font-family: "Plus Jakarta Sans", sans-serif; font-size: 16px;
        color: var(--ink); font-weight: 600;
      }
      .renewal .r-right {
        font-family: "Plus Jakarta Sans", sans-serif; font-size: 44px;
        font-weight: 700; color: var(--ink); line-height: 1;
        letter-spacing: -0.03em;
      }
      .renewal.has-due .r-right { color: #B88B00; }

      /* Per-path table */
      .paths-section { margin-top: 24px; }
      .paths-table {
        background: var(--surface-alt);
        border: 1px solid var(--line);
        border-radius: 16px; overflow: hidden;
      }
      .paths-table .row {
        display: grid;
        grid-template-columns: 1.5fr repeat(3, 1fr);
        gap: 0;
        padding: 20px 24px;
        border-top: 1px solid var(--hairline);
        align-items: baseline;
      }
      .paths-table .row.head {
        border-top: none; background: var(--hairline);
        font-family: "JetBrains Mono", monospace; font-size: 11px;
        text-transform: uppercase; letter-spacing: 0.12em; color: var(--mute);
        font-weight: 600;
      }
      .paths-table .row.head > div { padding: 4px 0; }
      .paths-table .num-col { text-align: right; }
      .paths-table .pname {
        font-weight: 600; font-size: 16px; color: var(--ink);
      }
      .paths-table .pid {
        font-family: "JetBrains Mono", monospace; font-size: 11px;
        color: var(--mute); margin-top: 3px;
      }
      .paths-table .cell {
        font-family: "Plus Jakarta Sans", sans-serif; font-weight: 600;
        font-size: 18px;
      }
      .paths-table .cell.good { color: var(--ok); }
      .paths-table .cell.bad  { color: var(--bad); }
      .paths-table .cell.mute { color: var(--mute); }
      @media (max-width: 640px) {
        .paths-table .row { grid-template-columns: 1fr 1fr; gap: 8px; }
        .paths-table .row.head { display: none; }
        .paths-table .cell::before {
          content: attr(data-label);
          display: block;
          font-family: "JetBrains Mono", monospace; font-size: 10px;
          color: var(--mute); text-transform: uppercase; letter-spacing: 0.12em;
          font-weight: 600; margin-bottom: 2px;
        }
      }

      .state { padding: 80px 24px; text-align: center; font-family: "JetBrains Mono", monospace; font-size: 13px; color: var(--mute); }
      .state.err { color: var(--bad); }

      footer {
        margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--line);
        font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--mute);
        display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;
      }
    </style>
  </head>

      <div class="lede">
        <div class="kicker">Certification Compliance</div>
        <h1 id="h1">Workforce compliance overview</h1>
        <p class="sub" id="sub">Loading the latest figures…</p>
      </div>

      <div id="content">
        <div class="state">Loading data…</div>
      </div>

      <footer>
        <span>Auto-refreshed hourly · Data from 360Learning API v2</span>
        <span id="source">—</span>
      </footer>
    </div>

    <script>
      const fmtRelative = (iso) => {
        if (!iso) return "—";
        const d = new Date(iso);
        if (isNaN(d)) return "—";
        const mins = Math.round((Date.now() - d.getTime()) / 60000);
        if (mins < 1) return "just now";
        if (mins < 60) return mins + " min ago";
        const hrs = Math.round(mins / 60);
        if (hrs < 24) return hrs + "h ago";
        return Math.round(hrs / 24) + "d ago";
      };
      const fmtDate = (iso) => {
        if (!iso) return "—";
        const d = new Date(iso);
        return isNaN(d) ? "—" : d.toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" });
      };
      const escapeHtml = (s) => String(s).replace(/[&<>"\u0027]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","\u0027":"&#39;"}[c]));

      function donutSVG(compliant, nonCompliant) {
        const total = compliant + nonCompliant;
        const r = 85, cx = 110, cy = 110, sw = 26;
        const circ = 2 * Math.PI * r;
        const compFrac = total > 0 ? compliant / total : 0;
        const compLen = compFrac * circ;
        return `
          <svg viewBox="0 0 220 220" aria-hidden="true">
            <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--bad-soft)" stroke-width="${sw}" />
            <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--ok)" stroke-width="${sw}"
                    stroke-dasharray="${compLen} ${circ - compLen}" stroke-linecap="butt" />
          </svg>
        `;
      }

      function render(data) {
        const content = document.getElementById("content");
        const stamp = document.getElementById("stamp");
        const source = document.getElementById("source");
        const sub = document.getElementById("sub");

        stamp.textContent = "updated " + fmtRelative(data.generatedAt);
        source.textContent = "generated " + fmtDate(data.generatedAt);

        const pathCount = data.pathCount || 0;
        const pathWord = pathCount === 1 ? "1 certification path" : `${pathCount} certification paths`;
        sub.innerHTML = `Tracking <strong>${data.totalActiveUsers.toLocaleString()}</strong> active users across <strong>${pathWord}</strong>. A user is compliant only when they hold an in-date certificate on every path (validity ${data.validityMonths} months).`;

        const total = data.totalActiveUsers || 0;
        const compliantPct = total > 0 ? Math.round((data.compliant / total) * 100) : 0;
        const lapsed = data.nonComplianceReasons?.lapsedAtLeastOne || 0;
        const missing = data.nonComplianceReasons?.missingAtLeastOne || 0;

        const renewals = data.renewalsDue || {};
        const windows = (data.renewalWindows || []).sort((a, b) => a - b);

        content.innerHTML = `
          <div class="grid-primary">
            <div class="panel">
              <div class="title">Compliance status</div>
              <div class="donut-panel">
                <div class="donut">
                  ${donutSVG(data.compliant, data.nonCompliant)}
                  <div class="center">
                    <span class="big">${compliantPct}%</span>
                    <span class="lbl">compliant</span>
                  </div>
                </div>
                <ul class="legend">
                  <li>
                    <span class="swatch" style="background: var(--ok)"></span>
                    <span class="name">Compliant<small>In-date on every path</small></span>
                    <span class="count">${data.compliant.toLocaleString()}<small>${total > 0 ? ((data.compliant/total)*100).toFixed(1) : '0.0'}%</small></span>
                  </li>
                  <li>
                    <span class="swatch" style="background: var(--bad)"></span>
                    <span class="name">Non-compliant<small>Lapsed: ${lapsed.toLocaleString()} · Never earned: ${missing.toLocaleString()}</small></span>
                    <span class="count">${data.nonCompliant.toLocaleString()}<small>${total > 0 ? ((data.nonCompliant/total)*100).toFixed(1) : '0.0'}%</small></span>
                  </li>
                </ul>
              </div>
            </div>

            <div class="panel">
              <div class="title">Upcoming renewals</div>
              <div class="renewals">
                ${windows.map(w => {
                  const n = renewals[String(w)] || 0;
                  return `
                    <div class="renewal ${n > 0 ? 'has-due' : ''}">
                      <div class="r-left">
                        <div class="n">Next ${w} days</div>
                        <div class="w">Compliant users expiring</div>
                      </div>
                      <div class="r-right">${n.toLocaleString()}</div>
                    </div>
                  `;
                }).join("")}
              </div>
            </div>
          </div>

          ${data.paths && data.paths.length > 0 ? `
            <div class="paths-section">
              <div class="panel" style="padding: 0;">
                <div class="paths-table">
                  <div class="row head">
                    <div>Path</div>
                    <div class="num-col">Compliant</div>
                    <div class="num-col">Lapsed</div>
                    <div class="num-col">Never earned</div>
                  </div>
                  ${data.paths.map(p => `
                    <div class="row">
                      <div>
                        <div class="pname">${escapeHtml(p.label)}</div>
                        <div class="pid">${escapeHtml(p.id)}</div>
                      </div>
                      <div class="cell num-col good" data-label="Compliant">${(p.compliant||0).toLocaleString()}</div>
                      <div class="cell num-col bad"  data-label="Lapsed">${(p.lapsed||0).toLocaleString()}</div>
                      <div class="cell num-col mute" data-label="Never earned">${(p.missing||0).toLocaleString()}</div>
                    </div>
                  `).join("")}
                </div>
              </div>
            </div>
          ` : ''}
        `;
      }

      fetch("data.json?ts=" + Date.now())
        .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then(render)
        .catch(err => {
          document.getElementById("content").innerHTML =
            `<div class="state err">Couldn\u0027t load data.json — has the workflow run yet?<br/>(${escapeHtml(err.message)})</div>`;
          document.getElementById("stamp").textContent = "error";
        });
    </script>
  </body>
</html>
