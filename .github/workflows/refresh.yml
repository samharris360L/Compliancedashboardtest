name: Refresh data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "refresh-data"
  cancel-in-progress: false

jobs:
  # Job 1: fetch fresh data and commit it. If this succeeds, the
  # data is safe in the repo regardless of what Pages does later.
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data from 360Learning
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          BASE_URL: ${{ vars.BASE_URL || 'https://app.360learning.com' }}
        run: python fetch_data.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "chore: refresh data.json [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected, rebasing and retrying (attempt $attempt)..."
            git pull --rebase --autostash origin main
          done
          echo "Push still failing after 5 attempts."
          exit 1

      - name: Build Pages output
        run: |
          mkdir -p _site
          cp index.html data.json _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # Job 2: deploy to Pages. Runs after refresh but failure here does
  # NOT block future runs — your data.json is already safely committed.
  # Bounded to 5 minutes so a stuck Pages sync can't waste Actions time.
  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # continue-on-error means a Pages deploy failure won't mark the
    # whole workflow run as failed when reported on the repo homepage,
    # so alerts for real issues are more meaningful.
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
